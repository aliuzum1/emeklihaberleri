name: Otomatik Haber Güncelleme

on:
  schedule:
    - cron: '0 */2 * * *' # Her 2 saatte bir otomatik çalışır
  workflow_dispatch: # GitHub panelinden istediğiniz an "Manuel" tetikleyebilirsiniz

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu Kopyala
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Haberleri Çek ve JSON Oluştur
        run: python update.py

      - name: Değişiklikleri GitHub'a Otomatik Kaydet
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Otomatik haberler güncellendi (news.json)"
          branch: main
