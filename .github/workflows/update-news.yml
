name: Otomatik Haber Güncelleme

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu Kopyala
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Paketleri Yükle
        run: pip install requests beautifulsoup4

      - name: Haberleri Çek ve JSON Oluştur
        run: python update.py

      - name: Değişiklikleri GitHub'a Otomatik Kaydet
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "SGK haberleri otomatik güncellendi"
          branch: main
