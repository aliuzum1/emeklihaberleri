    <script>
        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('newsContainer');
                if (data.length > 0) {
                    container.innerHTML = '';
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'news-card';
                        card.innerHTML = `
                            <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                            <div class="news-footer" style="justify-content: flex-end; margin-top: 15px;">
                                <a href="${item.link}" target="_blank" class="read-btn">Habere Git &rarr;</a>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<p style="text-align:center;">Henüz haber bulunamadı.</p>';
                }
            })
            .catch(error => {
                document.getElementById('newsContainer').innerHTML = '<p style="text-align:center; color:red;">Haberler yüklenirken bir hata oluştu.</p>';
            });
    </script>
